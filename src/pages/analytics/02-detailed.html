<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style></style>
</head>
<body style="margin:0;min-height:100vh;display:flex;flex-direction:column;font-family:var(--font-family-body);background:var(--color-surface);color:var(--color-on-surface)">
  <nav style="display:flex;align-items:center;gap:var(--space-4);padding:var(--space-4) var(--space-8);border-bottom:var(--border-default);background:var(--color-surface)">
    <a href="#" style="font-family:var(--font-family-display);font-weight:var(--font-weight-semibold);color:var(--color-on-surface);text-decoration:none;font-size:var(--font-size-lg)">Design System</a>
    <div style="display:flex;gap:var(--space-1);margin-left:var(--space-6)">
      <a href="#" class="btn btn-ghost" style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-sm)">Home</a>
      <a href="#" class="btn btn-ghost" style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-sm)">Product</a>
      <a href="#" class="btn btn-ghost" style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-sm)">Sales</a>
      <a href="#" class="btn btn-ghost" style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-sm)">Contact</a>
      <a href="#" class="btn btn-ghost" style="padding:var(--space-2) var(--space-3);font-size:var(--font-size-sm)">About Us</a>
    </div>
    <div style="margin-left:auto;width:36px;height:36px;border-radius:50%;background:var(--color-surface-variant)"></div>
  </nav>
  
  <main style="flex:1;padding:var(--space-10);max-width:1200px;width:100%;margin:0 auto;box-sizing:border-box">
    <div style="display:flex;flex-direction:column;gap:var(--space-6)">
      <div style="display:flex;justify-content:space-between;align-items:center"><div><h2 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular);margin:0">Detailed Report</h2><p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant);margin:var(--space-1) 0 0 0">Page-by-page performance breakdown.</p></div><div style="display:flex;gap:var(--space-2)"><input class="input" placeholder="Filter pages…" style="width:200px" /><button class="btn btn-primary">Export CSV</button></div></div>
      <div class="card" style="padding:var(--space-4);overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:var(--font-size-sm)"><thead><tr style="border-bottom:var(--border-default)"><th style="text-align:left;padding:var(--space-2) var(--space-3);color:var(--color-on-surface-variant);font-weight:var(--font-weight-medium)">Page</th><th style="text-align:right;padding:var(--space-2) var(--space-3);color:var(--color-on-surface-variant);font-weight:var(--font-weight-medium)">Views</th><th style="text-align:right;padding:var(--space-2) var(--space-3);color:var(--color-on-surface-variant);font-weight:var(--font-weight-medium)">Visitors</th><th style="text-align:right;padding:var(--space-2) var(--space-3);color:var(--color-on-surface-variant);font-weight:var(--font-weight-medium)">Bounce</th><th style="text-align:right;padding:var(--space-2) var(--space-3);color:var(--color-on-surface-variant);font-weight:var(--font-weight-medium)">Avg Time</th></tr></thead><tbody><tr style="border-bottom:var(--border-default)"><td style="padding:var(--space-3)">/index</td><td style="padding:var(--space-3);text-align:right">42,180</td><td style="padding:var(--space-3);text-align:right">14,230</td><td style="padding:var(--space-3);text-align:right">28%</td><td style="padding:var(--space-3);text-align:right">5m 20s</td></tr><tr style="border-bottom:var(--border-default)"><td style="padding:var(--space-3)">/patterns</td><td style="padding:var(--space-3);text-align:right">31,840</td><td style="padding:var(--space-3);text-align:right">11,520</td><td style="padding:var(--space-3);text-align:right">35%</td><td style="padding:var(--space-3);text-align:right">3m 45s</td></tr><tr style="border-bottom:var(--border-default)"><td style="padding:var(--space-3)">/pricing</td><td style="padding:var(--space-3);text-align:right">18,400</td><td style="padding:var(--space-3);text-align:right">8,740</td><td style="padding:var(--space-3);text-align:right">42%</td><td style="padding:var(--space-3);text-align:right">2m 10s</td></tr><tr><td style="padding:var(--space-3)">/docs</td><td style="padding:var(--space-3);text-align:right">12,650</td><td style="padding:var(--space-3);text-align:right">4,380</td><td style="padding:var(--space-3);text-align:right">22%</td><td style="padding:var(--space-3);text-align:right">8m 05s</td></tr></tbody></table></div>
    </div>
  </main>
  
  <footer style="border-top:var(--border-default);padding:var(--space-4) var(--space-6);display:flex;justify-content:space-between;font-size:var(--font-size-xs);color:var(--color-on-surface-variant)">
    <span>© 2026 Design System Demo</span>
    <span style="display:flex;gap:var(--space-3)"><a href="#" style="color:var(--color-primary);text-decoration:none">Home</a><a href="#" style="color:var(--color-primary);text-decoration:none">Patterns</a><a href="#" style="color:var(--color-primary);text-decoration:none">GitHub</a></span>
  </footer>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme')document.documentElement.setAttribute('data-theme',e.data.theme)})</script>
</body>
</html>
