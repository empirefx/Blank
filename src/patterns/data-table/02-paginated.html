<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:100%;;display:flex;flex-direction:column;gap:var(--space-2)">
  <div style="display:flex;gap:var(--space-3);padding-bottom:var(--space-2)">
    <span style="flex:2;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Name</span>
    <span style="flex:1;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Role</span>
    <span style="flex:1;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Status</span>
  </div>
  <hr style="border:none;border-top:var(--border-default);margin:0" />
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0"><span style="flex:2;font-size:var(--font-size-sm)">Diana Park</span><span style="flex:1;font-size:var(--font-size-sm)">Designer</span><span style="flex:1"><span class="badge badge-success">Active</span></span></div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0"><span style="flex:2;font-size:var(--font-size-sm)">Erik Johansson</span><span style="flex:1;font-size:var(--font-size-sm)">Engineer</span><span style="flex:1"><span class="badge badge-success">Active</span></span></div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0"><span style="flex:2;font-size:var(--font-size-sm)">Fatima Al-Rashid</span><span style="flex:1;font-size:var(--font-size-sm)">PM</span><span style="flex:1"><span class="badge badge-gray">Away</span></span></div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0"><span style="flex:2;font-size:var(--font-size-sm)">George Kim</span><span style="flex:1;font-size:var(--font-size-sm)">Engineer</span><span style="flex:1"><span class="badge badge-success">Active</span></span></div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0"><span style="flex:2;font-size:var(--font-size-sm)">Helen O'Brien</span><span style="flex:1;font-size:var(--font-size-sm)">Designer</span><span style="flex:1"><span class="badge badge-error">Inactive</span></span></div>
  <hr style="border:none;border-top:var(--border-default);margin:0" />
  <div style="display:flex;justify-content:center;gap:var(--space-2);padding-top:var(--space-2)">
    <button class="btn btn-secondary" style="padding:var(--space-1) var(--space-3);font-size:var(--font-size-sm)">‹ Prev</button>
    <span style="display:flex;align-items:center;gap:var(--space-1);font-size:var(--font-size-sm)"><span style="padding:var(--space-1) var(--space-2);background:var(--color-primary-container);border-radius:var(--radius-sm);color:var(--color-on-primary-container)">1</span><span style="padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm)">2</span><span style="padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm)">3</span></span>
    <button class="btn btn-secondary" style="padding:var(--space-1) var(--space-3);font-size:var(--font-size-sm)">Next ›</button>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
