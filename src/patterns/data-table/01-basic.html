<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:100%;;display:flex;flex-direction:column;gap:var(--space-2)">
  <div style="display:flex;gap:var(--space-3);padding-bottom:var(--space-2)">
    <span style="flex:2;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Name</span>
    <span style="flex:1;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Role</span>
    <span style="flex:1;font-size:var(--font-size-xs);color:var(--color-on-surface-variant);text-transform:uppercase;letter-spacing:var(--letter-spacing-wide)">Status</span>
  </div>
  <hr style="border:none;border-top:var(--border-default);margin:0" />
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0">
    <span style="flex:2;font-size:var(--font-size-sm)">Alice Chen</span>
    <span style="flex:1;font-size:var(--font-size-sm)">Designer</span>
    <span style="flex:1"><span class="badge badge-success">Active</span></span>
  </div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0">
    <span style="flex:2;font-size:var(--font-size-sm)">Bob Martinez</span>
    <span style="flex:1;font-size:var(--font-size-sm)">Engineer</span>
    <span style="flex:1"><span class="badge badge-success">Active</span></span>
  </div>
  <div style="display:flex;gap:var(--space-3);align-items:center;padding:var(--space-2) 0">
    <span style="flex:2;font-size:var(--font-size-sm)">Carol Singh</span>
    <span style="flex:1;font-size:var(--font-size-sm)">PM</span>
    <span style="flex:1"><span class="badge badge-gray">Away</span></span>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
