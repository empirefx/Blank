<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <div style="width:100%;;display:flex;gap:var(--space-5)">
  <div style="width:160px;height:180px;border-radius:var(--radius-xl);background:var(--color-surface-variant);flex:none;opacity:0.5"></div>
  <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-2)">
    <h3 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular)">Limited Edition Watch</h3>
    <span style="font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);color:var(--color-on-surface-variant)">$299.00</span>
    <span class="badge badge-error">Out of Stock</span>
    <p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant)">This item is currently unavailable. Sign up to be notified when it's back.</p>
    <div style="display:flex;gap:var(--space-2)"><input class="input" placeholder="your@email.com" style="flex:1" /><button class="btn btn-secondary">Notify Me</button></div>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
