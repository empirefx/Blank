<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
  <div style="width:100%;display:flex;gap:var(--space-5)">
  <div style="width:180px;height:200px;border-radius:var(--radius-xl);background:var(--color-surface-variant);flex:none"></div>
  <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-2)">
    <h3 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular);font-size:var(--font-size-xl)">Classic Leather Backpack</h3>
    <span style="font-size:var(--font-size-lg);font-weight:var(--font-weight-semibold);color:var(--color-primary)">$89.00</span>
    <div style="display:flex;gap:2px"><span style="color:var(--color-warning)">★</span><span style="color:var(--color-warning)">★</span><span style="color:var(--color-warning)">★</span><span style="color:var(--color-warning)">★</span><span style="color:var(--color-surface-variant)">★</span><span style="font-size:var(--font-size-xs);color:var(--color-on-surface-variant);margin-left:var(--space-1)">(24 reviews)</span></div>
    <p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant);line-height:1.5">Full-grain leather backpack with padded laptop compartment and brass hardware. Available in three colors.</p>
    <div style="display:flex;gap:var(--space-2);margin-top:var(--space-2)"><button class="btn btn-primary" style="flex:1">Add to Cart</button><button class="btn btn-secondary">♡</button></div>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme')document.documentElement.setAttribute('data-theme',e.data.theme)})</script>
</body>
</html>
