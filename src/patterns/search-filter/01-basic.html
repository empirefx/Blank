<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:400px;display:flex;flex-direction:column;gap:var(--space-4)">
  <input class="input" placeholder="Search products, categories…" style="border-radius:var(--radius-round);padding-left:var(--space-10)" />
  <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">
    <span class="badge badge-primary">All</span>
    <span class="badge badge-gray">Electronics</span>
    <span class="badge badge-gray">Clothing</span>
    <span class="badge badge-gray">Home</span>
    <span class="badge badge-gray">Books</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:var(--space-3)">
    <div class="card" style="padding:var(--space-4)"><p style="font-size:var(--font-size-sm)"><strong>Wireless Headphones</strong> — $79.99</p></div>
    <div class="card" style="padding:var(--space-4)"><p style="font-size:var(--font-size-sm)"><strong>Cotton T-Shirt</strong> — $24.99</p></div>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
