<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:400px;display:flex;flex-direction:column;gap:var(--space-4)">
  <div style="display:flex;gap:var(--space-3)">
    <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-1)"><label class="label-caps">First Name</label><input class="input" value="Jane" /></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-1)"><label class="label-caps">Last Name</label><input class="input" value="Doe" /></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:var(--space-1)"><label class="label-caps">Address</label><input class="input" value="123 Design St" /></div>
  <div style="display:flex;gap:var(--space-3)">
    <div style="flex:2;display:flex;flex-direction:column;gap:var(--space-1)"><label class="label-caps">City</label><input class="input" value="San Francisco" /></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-1)"><label class="label-caps">ZIP</label><input class="input" value="94105" /></div>
  </div>
  <div style="display:flex;gap:var(--space-3)">
    <button class="btn btn-secondary" style="flex:1">Back to Cart</button>
    <button class="btn btn-primary" style="flex:1">Continue</button>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme')document.documentElement.setAttribute('data-theme',e.data.theme)})</script>
</body>
</html>
