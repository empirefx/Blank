<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:var(--space-4);text-align:center;padding:var(--space-8)">
  <div style="width:64px;height:64px;border-radius:50%;background:var(--color-surface-container);margin:0 auto"></div>
  <h3 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular)">No messages</h3>
  <p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant)">Your inbox is empty. Here are some suggestions:</p>
  <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;justify-content:center">
    <span class="badge badge-primary">Browse templates</span>
    <span class="badge badge-primary">Invite team</span>
    <span class="badge badge-primary">View docs</span>
  </div>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme')document.documentElement.setAttribute('data-theme',e.data.theme)})</script>
</body>
</html>
