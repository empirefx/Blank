<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:var(--space-4);text-align:center;padding:var(--space-8)">
  <div style="width:120px;height:120px;border-radius:50%;background:var(--color-surface-container)"></div>
  <h3 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular)">No results found</h3>
  <p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant);max-width:300px">Try adjusting your search or filter criteria to find what you're looking for.</p>
  <button class="btn btn-secondary">Clear Filters</button>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
