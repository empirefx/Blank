<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:340px;display:flex;flex-direction:column;gap:var(--space-4)">
  <div style="display:flex;flex-direction:column;gap:var(--space-1)">
    <label class="label-caps" for="login-email">Email</label>
    <input class="input" id="login-email" type="email" placeholder="user@example.com" />
  </div>
  <div style="display:flex;flex-direction:column;gap:var(--space-1)">
    <label class="label-caps" for="login-pass">Password</label>
    <input class="input" id="login-pass" type="password" placeholder="••••••••" />
  </div>
  <button class="btn btn-primary" style="width:100%">Sign In</button>
  <a href="#" style="font-size:var(--font-size-sm);text-align:center;color:var(--color-primary);text-decoration:none">Forgot password?</a>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
