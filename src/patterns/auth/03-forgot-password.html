<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:340px;display:flex;flex-direction:column;gap:var(--space-4);text-align:center">
  <div style="width:64px;height:64px;border-radius:50%;background:var(--color-surface-container);margin:0 auto"></div>
  <h3 style="font-family:var(--font-family-display);font-weight:var(--font-weight-regular)">Reset your password</h3>
  <p style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant)">Enter your email and we'll send you a recovery link.</p>
  <div style="display:flex;flex-direction:column;gap:var(--space-1);text-align:left">
    <label class="label-caps" for="reset-email">Email</label>
    <input class="input" id="reset-email" type="email" placeholder="your@email.com" />
  </div>
  <button class="btn btn-primary" style="width:100%">Send Reset Link</button>
  <a href="#" style="font-size:var(--font-size-sm);color:var(--color-on-surface-variant);text-decoration:none">Back to sign in</a>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
