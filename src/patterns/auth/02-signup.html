<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../styles/core.css" />
  <link rel="stylesheet" href="../../styles/components.css" />
  <style>
    body {
      margin: 0;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: var(--font-family-body);
      background: var(--color-surface);
    }
  </style>
</head>
<body>
<div style="width:380px;display:flex;flex-direction:column;gap:var(--space-4)">
  <div style="display:flex;gap:var(--space-3)">
    <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-1)">
      <label class="label-caps" for="signup-first">First Name</label>
      <input class="input" id="signup-first" placeholder="Jane" />
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:var(--space-1)">
      <label class="label-caps" for="signup-last">Last Name</label>
      <input class="input" id="signup-last" placeholder="Doe" />
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:var(--space-1)">
    <label class="label-caps" for="signup-email">Email</label>
    <input class="input" id="signup-email" type="email" placeholder="jane@example.com" />
  </div>
  <div style="display:flex;flex-direction:column;gap:var(--space-1)">
    <label class="label-caps" for="signup-pass">Password</label>
    <input class="input" id="signup-pass" type="password" placeholder="Create a password" />
  </div>
  <button class="btn btn-primary" style="width:100%">Create Account</button>
  <p style="font-size:var(--font-size-sm);text-align:center;color:var(--color-on-surface-variant)">Already have an account? <a href="#" style="color:var(--color-primary);text-decoration:none">Sign in</a></p>
</div>
<script>window.addEventListener('load',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});window.addEventListener('resize',function(){parent.postMessage({type:'resize',height:document.documentElement.scrollHeight},'*')});</script>
</body>
</html>
